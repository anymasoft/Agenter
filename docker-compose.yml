services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./backend/agenter.db:/app/agenter.db
      - ./frontend:/app/../frontend:ro
    restart: unless-stopped
