<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Agenter Desktop · Windows assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="desktop.css" />
<style>
  body { background: #EEF1F4; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="desktop-screens.jsx"></script>
<script type="text/babel">
const App = () => (
  <DesignCanvas title="Agenter Desktop" subtitle="Windows-ассистент · мастер подключения, главное окно, настройки и трей">
    <DCSection id="wizard" title="Мастер первого подключения" subtitle="4 шага · 880 × 620 · окно Windows">
      <DCArtboard id="w1" label="01 — Приветствие" width={880} height={620}>
        <Step1Welcome />
      </DCArtboard>
      <DCArtboard id="w2" label="02 — Параметры базы" width={880} height={620}>
        <Step2Params />
      </DCArtboard>
      <DCArtboard id="w3" label="03 — Локальная индексация" width={880} height={620}>
        <Step3Process />
      </DCArtboard>
      <DCArtboard id="w4" label="04 — Готово" width={880} height={620}>
        <Step4Done />
      </DCArtboard>
    </DCSection>

    <DCSection id="main" title="Основное окно ассистента" subtitle="Открывается из трея · 420 × 560">
      <DCArtboard id="app" label="Главное окно · подключённая база" width={420} height={560}>
        <MainAppWindow />
      </DCArtboard>
      <DCArtboard id="settings" label="Настройки · Общие" width={560} height={600}>
        <SettingsWindow />
      </DCArtboard>
    </DCSection>

    <DCSection id="tray" title="Трей и системные уведомления" subtitle="Работа в фоне · ассистент почти невидим">
      <DCArtboard id="toast" label="Toast-уведомление · задача выполнена" width={460} height={360}>
        <TrayNotification />
      </DCArtboard>
      <DCArtboard id="menu" label="Контекстное меню трея · правый клик" width={460} height={360}>
        <TrayContextMenu />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
