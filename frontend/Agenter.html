<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Agenter — Design exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { background: #F1F3F6; }
  /* Make canvas background subtly tonal so light artboards pop */
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="chat-screen.jsx"></script>
<script type="text/babel" src="connect-screen.jsx"></script>
<script type="text/babel" src="projects-screen.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

const App = () => (
  <DesignCanvas
    title="Agenter"
    subtitle="Premium minimal SaaS for 1C:Enterprise agentic development"
    initialZoom={0.55}
  >
    <DCSection id="main" title="Главный экран — рабочее пространство">
      <DCArtboard id="chat" label="Chat workspace · ERP Производство v4.2" width={1440} height={900}>
        <ChatScreen />
      </DCArtboard>
    </DCSection>

    <DCSection id="onboarding" title="Подключение первой базы">
      <DCArtboard id="connect" label="Connect base · step 2/3" width={1440} height={900}>
        <ConnectScreen />
      </DCArtboard>
    </DCSection>

    <DCSection id="overview" title="Список проектов">
      <DCArtboard id="projects" label="Projects list · all bases" width={1440} height={900}>
        <ProjectsScreen />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
