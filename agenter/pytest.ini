[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    slow: tests that take >5s (e.g. real db_load)
    requires_1c: tests that require 1C platform installed
    requires_agent: end-to-end scenario tests that spin up the SDK
